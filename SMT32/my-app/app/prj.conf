# ---------- Shell (console via ST-LINK = lpuart1, configurado no board DTS) ----------
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y

# ---------- Diagnóstico de threads (não intrusivo) ----------
CONFIG_THREAD_MONITOR=y
CONFIG_THREAD_RUNTIME_STATS=y
CONFIG_THREAD_RUNTIME_STATS_USE_TIMING_FUNCTIONS=y
CONFIG_THREAD_NAME=y
CONFIG_THREAD_STACK_INFO=y

# ---------- GPIO (LED + botão) ----------
CONFIG_GPIO=y

# ---------- UART assíncrono (ESP32 via USART3) ----------
CONFIG_SERIAL=y
CONFIG_UART_ASYNC_API=y

# ---------- FFT via CMSIS-DSP ----------
CONFIG_CMSIS_DSP=y
CONFIG_CMSIS_DSP_TRANSFORM=y
CONFIG_CMSIS_DSP_COMPLEXMATH=y
CONFIG_CMSIS_DSP_STATISTICS=y
CONFIG_FPU=y

# ---------- Heap do kernel (para sys_heap_runtime_stats_get) ----------
CONFIG_HEAP_MEM_POOL_SIZE=1024
CONFIG_SYS_HEAP_RUNTIME_STATS=y

# ---------- Timing para runtime stats ----------
CONFIG_TIMING_FUNCTIONS=y

# Inicializa stacks com padrão para k_thread_stack_space_get()
CONFIG_INIT_STACKS=y
